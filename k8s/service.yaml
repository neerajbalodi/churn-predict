apiVersion: v1
kind: Service
metadata:
  name: churn-api
spec:
  # On EKS, type LoadBalancer provisions an AWS load balancer with a public
  # DNS name. For local clusters (kind/minikube) use NodePort or port-forward.
  type: LoadBalancer
  selector:
    app: churn-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
