apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
  labels:
    app: churn-api
spec:
  replicas: 2                      # two pods -> self-healing + basic HA
  selector:
    matchLabels:
      app: churn-api
  template:
    metadata:
      labels:
        app: churn-api
    spec:
      containers:
        - name: churn-api
          # Replace with your image: <dockerhub-user>/churn-api:<tag>
          # or your ECR URI: <acct>.dkr.ecr.<region>.amazonaws.com/churn-api:<tag>
          image: REPLACE_ME/churn-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: churn-api-config
          resources:                # sized for a small model in memory
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:           # don't send traffic until model is loaded
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:            # restart if it wedges
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
